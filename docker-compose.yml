version: '3.9'

services:
  # ============================================================================
  # PostgreSQL Database with PostGIS
  # ============================================================================
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: sevaihub-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password_change_me}
      POSTGRES_DB: sevaihub
      POSTGRES_INITDB_ARGS: "-c max_connections=200"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sevaihub_network

  # ============================================================================
  # FastAPI Backend
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sevaihub-backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres_password_change_me}@postgres:5432/sevaihub
      SECRET_KEY: ${SECRET_KEY:-change-this-secret-key-in-production}
      ADMIN_MOBILE: ${ADMIN_MOBILE:-9999999999}
      ADMIN_AADHAAR: ${ADMIN_AADHAAR:-123456789012}
      ADMIN_SECRET_KEY: ${ADMIN_SECRET_KEY:-change-this-admin-key}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-$2b$12$uL44WyGrcbXj1/QhPFuS0uFB2sMooMRkByCOl3zatvRSLv76S2MQS}
      CORS_ORIGINS: http://localhost:8080,http://sevaihub-frontend,http://localhost:3000,http://localhost:5173
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-False}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_URL: ${MINIO_URL:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-noreply@sevaihub.com}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app  # Hot reload for development
      - /app/__pycache__  # Exclude pycache from volume
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sevaihub_network

  # ============================================================================
  # React Frontend
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_ENVIRONMENT: development
    container_name: sevaihub-frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_ENVIRONMENT: development
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app  # Hot reload for development (Vite only)
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sevaihub_network

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: sevaihub-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sevaihub_network
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  # ============================================================================
  # MinIO Object Storage
  # ============================================================================
  minio:
    image: minio/minio:latest
    container_name: sevaihub-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sevaihub_network

  # ============================================================================
  # Nginx Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: sevaihub-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    healthcheck:
      # test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sevaihub_network

networks:
  sevaihub_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
